# ============================================================================
# ELM — EnviousLabs Minecraft — Local Pack Config
# ============================================================================

MC_VERSION="1.20.1"
LOADER="forge"
PREFER_SOURCE="mr"

# --- Sync Behavior -----------------------------------------------------------
# Mods not found during sync are auto-saved to unresolved.txt.
# Use 'elm resolve search' to find alternatives via Modrinth/CurseForge APIs.
# AUTO_PUBLISH=""             # Target name to auto-publish to CDN after sync/update
                              #   "" = off, "__auto__" = sibling cdn/ dir, "<target>" = named target
# CURSEFORGE_API_KEY=""       # Optional — enables CurseForge search (https://console.curseforge.com)

# --- Server Defaults --------------------------------------------------------
SERVER_VM_IP=""                         # Public/Tailscale IP
SERVER_DOMAIN="enviouslabs.com"         # Base domain for auto-naming targets
SERVER_BASE_PORT=25565                  # First server port (auto-increments)
SERVER_RCON_BASE_PORT=25575
SERVER_RAM="8192"
SERVER_DISK="25600"
SERVER_CPU="400"

# --- Pelican Panel (game server management) ---------------------------------
# PELICAN_URL=""                        # e.g. "https://panel.enviouslabs.com"
# PELICAN_NODE_ID=""                    # Wings node ID
# PELICAN_EGG_ID=""                     # Minecraft egg ID
# PELICAN_USER_ID=""                    # Panel user ID (server owner)
# Run 'elm deploy setup' for interactive configuration
# API key stored separately in ~/.config/elm/keys.conf via 'elm key pelican <token>'

# --- Self-Update (GitHub) -----------------------------------------------------
# ELM_GITHUB_REPO="MercifulMercy-IRIS/PackwizWrapper"
# ELM_GITHUB_BRANCH="main"
# ELM_GITHUB_PATH="envious-mc"

# --- Pack Hosting (for player auto-update) -----------------------------------
# PACK_HOST_URL="https://pack.enviouslabs.com"

# --- CDN (Caddy — auto-HTTPS via Let's Encrypt) ----------------------------
# CDN_DOMAIN="pack.enviouslabs.com"       # Set this for automatic HTTPS
                                           # Leave empty to serve on http://server-ip:8080

# --- Local/Self-Hosted Mods -------------------------------------------------
# LOCAL_MODS_DIR="/var/www/mods"
# LOCAL_MODS_URL="https://mods.enviouslabs.com"
