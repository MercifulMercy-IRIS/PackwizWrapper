# ============================================================================
# EnviousLabs PackManager — Local Pack Config
# ============================================================================

MC_VERSION="1.20.1"
LOADER="forge"
PREFER_SOURCE="mr"

# --- Docker Server -----------------------------------------------------------
SERVER_IMAGE="itzg/minecraft-server:java17"
SERVER_VM_IP=""                         # Public/Tailscale IP of the Docker VM
SERVER_DOMAIN="enviouslabs.com"         # Base domain for auto-naming targets
SERVER_BASE_PORT=25565                  # First server port (auto-increments)
SERVER_RCON_BASE_PORT=25575

# --- Server Defaults --------------------------------------------------------
SERVER_RAM="8192"
SERVER_DISK="25600"
SERVER_CPU="400"

# --- Self-Update (GitHub) -----------------------------------------------------
# PM_GITHUB_REPO="MercifulMercy-IRIS/PackwizWrapper"
# PM_GITHUB_BRANCH="main"
# PM_GITHUB_PATH="envious-mc"

# --- Pack Hosting (for player auto-update) -----------------------------------
# PACK_HOST_URL="https://pack.enviouslabs.com"

# --- CDN / Reverse Proxy (serves pack files + mod JARs to clients) ----------
# CDN_DOMAIN="pack.enviouslabs.com"       # Base domain for client pack downloads
# CDN_PROTO="https"                        # Protocol (http or https)
# CDN_ROOT="/var/www/packwiz"              # Filesystem root nginx serves from
# NGINX_CONF_DIR=""                        # Where to write nginx configs (default: CDN_ROOT/nginx)

# --- Local/Self-Hosted Mods -------------------------------------------------
# LOCAL_MODS_DIR="/var/www/mods"
# LOCAL_MODS_URL="https://mods.enviouslabs.com"
